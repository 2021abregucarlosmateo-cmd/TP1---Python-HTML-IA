<!DOCTYPE html>
<html>
<head>
    <title>Ver gastos</title>
</head>
<body>

    <h1>GASTOS</h1>

    {% for gasto in gastos %}
        <p>
            - {{ gasto['descripcion'] }} :
            ${{ gasto['monto'] }}
        </p>
    {% endfor %}

    <h2>TOTAL: ${{ total }}</h2>

    <a href="/">
        <button>Volver al menú</button>
    </a>

</body>
</html>
